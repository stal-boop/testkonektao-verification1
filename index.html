<!DOCTYPE html>
<html>
<head>
  <title>Konektao Verification</title>

  <style>
    * {
      font-family: Cambria, Georgia, "Times New Roman", serif !important;
      box-sizing: border-box;
    }

    body {
      background-color: #f4f6f5;
      margin: 0;
      padding: 0;
      text-align: center;
      color: #2c3e50;
    }

    .container {
      padding: 60px 20px 50px;
    }

    .logo {
      width: 140px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 5px 0;
      font-size: 26px;
      color: #1f2f46;
      font-weight: 700;
    }

    h2 {
      color: #1c8c7c;
      letter-spacing: 3px;
      margin-top: 12px;
      font-size: 18px;
      font-weight: 600;
    }

    .divider {
      width: 240px;
      height: 2px;
      background: #1c8c7c;
      margin: 14px auto 40px;
    }

    .card {
      background: #eef2f1;
      padding: 40px 35px;
      border-radius: 14px;
      max-width: 650px;
      margin: auto;
      box-shadow: 0 6px 16px rgba(0,0,0,0.05);
    }

    .name {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 28px;
      color: #1f2f46;
    }

    .info-box {
      background: #f9fbfa;
      padding: 22px 24px;
      border-radius: 10px;
      margin-bottom: 30px;
      text-align: left;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 14px;
      font-size: 18px;
    }

    .label {
      font-weight: 700;
      color: #6b7280;
    }

    .value {
      color: #2c3e50;
    }

    .status-box {
      padding: 24px;
      border-radius: 12px;
      border: 1px solid #1c8c7c;
      background: #e8f5f2;
      text-align: left;
    }

    .status-header {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: bold;
      color: #1c8c7c;
      margin-bottom: 12px;
      font-size: 20px;
    }

    .status-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #1c8c7c;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .status-message {
      font-size: 18px;
      line-height: 1.5;
      color: #2c3e50;
    }

    .footer {
      margin-top: 50px;
      color: #6b7280;
      font-size: 16px;
      line-height: 1.6;
    }

    .footer span {
      color: #1c8c7c;
      font-weight: bold;
      font-size: 17px;
    }

    .error {
      background: #fdecea;
      color: #b91c1c;
      padding: 25px;
      border-radius: 10px;
      max-width: 420px;
      margin: auto;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <img src="logo.png?v=2" class="logo">

    <!-- COMPANY NAME -->
    <h1>Konektao Global BPO Corporation</h1>

    <!-- TITLE -->
    <h2>EMPLOYMENT VERIFICATION</h2>
    <div class="divider"></div>

    <!-- CONTENT -->
    <div id="content"></div>

    <!-- FOOTER -->
    <div class="footer">
      For verification concerns, contact:<br>
      <span>info@konektao.com</span>
    </div>

  </div>

  <script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTL7-J4X2MfCVKamXM0jCdmNLywWK8B5HB4CAp1uJ661m2RiN9kze8mGUoVCfeLvQ0yWMcDB9PHAGjR/pub?output=csv";

    function getEmployeeID() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    function parseCSV(text) {
      return text.trim().split("\n").map(r => r.split(",").map(c => c.trim()));
    }

    function renderEmployee(emp) {
      document.getElementById("content").innerHTML = `
        <div class="card">
          <div class="name">${emp[1]}</div>

          <div class="info-box">
            <div class="info-row">
              <div class="label">Employee ID:</div>
              <div class="value">${emp[0]}</div>
            </div>
            <div class="info-row">
              <div class="label">Position:</div>
              <div class="value">${emp[2]}</div>
            </div>
            <div class="info-row">
              <div class="label">Department:</div>
              <div class="value">${emp[3]}</div>
            </div>
          </div>

          <div class="status-box">
            <div class="status-header">
              <div class="status-icon">✓</div>
              STATUS: ACTIVE
            </div>
            <div class="status-message">
              This employee is currently active with Konektao Global BPO Corporation.
            </div>
          </div>
        </div>
      `;
    }

    function renderNotFound() {
      document.getElementById("content").innerHTML = `
        <div class="error">
          <strong>Employee not found</strong><br>
          Please check the employee ID and try again.
        </div>
      `;
    }

    const employeeID = getEmployeeID();

    if (!employeeID) {
      renderNotFound();
    } else {
      fetch(sheetURL)
        .then(res => res.text())
        .then(text => {
          const rows = parseCSV(text);
          const data = rows.slice(1);
          const found = data.find(r => r[0] === employeeID);

          if (!found) {
            renderNotFound();
          } else {
            renderEmployee(found);
          }
        });
    }
  </script>

</body>
</html>
