<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Konektao Employment Verification</title>
  <style>
    :root {
      --bg: #f4f6f5;
      --navy: #132d63;
      --teal: #178d89;
      --card: #e9eeee;
      --white: #ffffff;
      --text: #24313f;
      --muted: #5d6673;

      --active-bg: #edf5f2;
      --active-border: #65b7a7;
      --active-text: #0f5f56;
      --active-icon: #38a993;

      --inactive-bg: #fdf0f0;
      --inactive-border: #e48080;
      --inactive-text: #b3261e;
      --inactive-icon: #e14d4d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 42px 24px 60px;
      text-align: center;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .logo-wrap img {
      width: 210px;
      max-width: 70%;
      height: auto;
      display: block;
    }

    .brand-text {
      font-size: 28px;
      font-weight: 700;
      color: var(--navy);
      line-height: 1;
    }

    .page-title {
      color: var(--teal);
      font-size: 30px;
      font-weight: 600;
      letter-spacing: 1px;
      margin: 28px 0 18px;
    }

    .title-line {
      width: 68%;
      max-width: 650px;
      height: 2px;
      background: var(--teal);
      margin: 0 auto 42px;
      opacity: 0.8;
    }

    .outer-card {
      background: var(--card);
      border-radius: 18px;
      padding: 34px 34px 28px;
      max-width: 820px;
      margin: 0 auto;
    }

    .employee-name {
      color: var(--navy);
      font-size: 34px;
      font-weight: 700;
      margin: 0 0 28px;
    }

    .info-box {
      background: var(--white);
      border-radius: 14px;
      padding: 28px 26px;
      margin-bottom: 28px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 220px 1fr;
      row-gap: 22px;
      column-gap: 18px;
      align-items: center;
      text-align: left;
    }

    .label {
      font-size: 20px;
      font-weight: 700;
      color: var(--muted);
    }

    .value {
      font-size: 20px;
      color: var(--text);
      text-align: right;
    }

    .status-box {
      border-radius: 14px;
      padding: 26px 28px;
      text-align: left;
      border: 2px solid transparent;
    }

    .status-active {
      background: var(--active-bg);
      border-color: var(--active-border);
      color: var(--active-text);
    }

    .status-inactive {
      background: var(--inactive-bg);
      border-color: var(--inactive-border);
      color: var(--inactive-text);
    }

    .status-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .status-icon {
      width: 46px;
      height: 46px;
      min-width: 46px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    .status-active .status-icon {
      background: var(--active-icon);
    }

    .status-inactive .status-icon {
      background: var(--inactive-icon);
    }

    .status-label {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .status-message {
      font-size: 24px;
      line-height: 1.45;
      margin: 0;
    }

    .footer-line {
      width: 86%;
      max-width: 860px;
      height: 2px;
      background: #d7dddd;
      margin: 42px auto 34px;
    }

    .footer-text {
      font-size: 22px;
      color: #4b5563;
      margin-bottom: 12px;
    }

    .footer-email {
      font-size: 24px;
      color: var(--teal);
      font-weight: 700;
    }

    .error-card {
      background: #fff;
      border-radius: 14px;
      padding: 30px;
      max-width: 720px;
      margin: 0 auto;
      box-shadow: 0 8px 22px rgba(0,0,0,0.06);
    }

    .error-title {
      color: #b3261e;
      font-size: 32px;
      font-weight: 700;
      margin: 0 0 12px;
    }

    .error-text {
      font-size: 20px;
      color: #4b5563;
      margin: 0;
    }

    @media (max-width: 768px) {
      .page {
        padding: 28px 16px 40px;
      }

      .logo-wrap img {
        width: 170px;
      }

      .page-title {
        font-size: 24px;
      }

      .outer-card {
        padding: 22px 18px 18px;
        border-radius: 14px;
      }

      .employee-name {
        font-size: 24px;
        margin-bottom: 20px;
      }

      .info-box {
        padding: 18px 16px;
      }

      .info-grid {
        grid-template-columns: 1fr;
        row-gap: 10px;
      }

      .label,
      .value {
        font-size: 18px;
        text-align: left;
      }

      .status-box {
        padding: 18px 16px;
      }

      .status-header {
        align-items: flex-start;
      }

      .status-label {
        font-size: 22px;
      }

      .status-message {
        font-size: 18px;
      }

      .footer-text,
      .footer-email {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="logo-wrap">
      <img src="logo.png" alt="Konektao Logo" onerror="this.style.display='none'">
      <div class="brand-text">Konektao</div>
    </div>

    <div class="page-title">EMPLOYMENT VERIFICATION</div>
    <div class="title-line"></div>

    <div id="app">
      <div class="error-card">
        <p class="error-text">Loading verification details...</p>
      </div>
    </div>

    <div class="footer-line"></div>
    <div class="footer-text">For verification concerns, contact:</div>
    <div class="footer-email">info@konektao.com</div>
  </div>

  <script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTL7-J4X2MfCVKamXM0jCdmNLywWK8B5HB4CAp1uJ661m2RiN9kze8mGUoVCfeLvQ0yWMcDB9PHAGjR/pub?output=csv";

    const params = new URLSearchParams(window.location.search);
    const employeeID = (params.get("id") || "").trim();

    function parseCSV(text) {
      return text
        .trim()
        .split("\n")
        .map(row => row.split(",").map(cell => cell.trim()));
    }

    function renderNotFound() {
      document.getElementById("app").innerHTML = `
        <div class="error-card">
          <h2 class="error-title">Employee not found</h2>
          <p class="error-text">Please check the employee ID and try again.</p>
        </div>
      `;
    }

    function renderError() {
      document.getElementById("app").innerHTML = `
        <div class="error-card">
          <h2 class="error-title">Unable to load data</h2>
          <p class="error-text">Please try again in a moment.</p>
        </div>
      `;
    }

    function renderEmployee(record) {
      const [id, name, position, department, rawStatus] = record;
      const status = (rawStatus || "").toUpperCase();
      const isActive = status === "ACTIVE";

      const statusClass = isActive ? "status-active" : "status-inactive";
      const statusIcon = isActive ? "✓" : "✕";
      const statusLabel = isActive ? "STATUS: ACTIVE" : "STATUS: INACTIVE";
      const statusMessage = isActive
        ? `This employee is currently <strong>active</strong> with Konektao Global BPO Corporation.`
        : `This employee ID is <strong>inactive</strong> and should not be considered a valid or current employment record with Konektao Global BPO Corporation.`;

      document.getElementById("app").innerHTML = `
        <div class="outer-card">
          <h1 class="employee-name">${name}</h1>

          <div class="info-box">
            <div class="info-grid">
              <div class="label">Employee ID:</div>
              <div class="value">${id}</div>

              <div class="label">Position:</div>
              <div class="value">${position}</div>

              <div class="label">Department:</div>
              <div class="value">${department}</div>
            </div>
          </div>

          <div class="status-box ${statusClass}">
            <div class="status-header">
              <div class="status-icon">${statusIcon}</div>
              <div class="status-label">${statusLabel}</div>
            </div>
            <p class="status-message">${statusMessage}</p>
          </div>
        </div>
      `;
    }

    if (!employeeID) {
      renderNotFound();
    } else {
      fetch(sheetURL)
        .then(res => res.text())
        .then(text => {
          const rows = parseCSV(text);
          const employees = rows.slice(1);
          const found = employees.find(row => (row[0] || "").trim() === employeeID);

          if (!found) {
            renderNotFound();
            return;
          }

          renderEmployee(found);
        })
        .catch(() => {
          renderError();
        });
    }
  </script>
</body>
</html>
